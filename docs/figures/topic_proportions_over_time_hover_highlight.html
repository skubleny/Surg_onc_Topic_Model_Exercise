<script>
document.addEventListener("DOMContentLoaded", function() {
    const gd = document.querySelector(".plotly-graph-div");
    if (!gd) return;

    function getBaseWidths() {
        return gd.data.map(t => (t.line && t.line.width) ? t.line.width : 2);
    }

    function getBaseOpacities() {
        return gd.data.map(t => (t.opacity === undefined || t.opacity === null) ? 1 : t.opacity);
    }

    const baseWidths = getBaseWidths();
    const baseOpacities = getBaseOpacities();
    const traceIndices = gd.data.map((_, i) => i);

    gd.on("plotly_hover", function(eventData) {
        if (!eventData || !eventData.points || eventData.points.length === 0) return;

        const curve = eventData.points[0].curveNumber;

        const widths = gd.data.map((_, i) => i === curve ? 6 : 1);
        const opacities = gd.data.map((_, i) => i === curve ? 1.0 : 0.15);

        Plotly.restyle(gd, {
            "line.width": widths,
            "opacity": opacities
        }, traceIndices);
    });

    gd.on("plotly_unhover", function() {
        Plotly.restyle(gd, {
            "line.width": baseWidths,
            "opacity": baseOpacities
        }, traceIndices);
    });
});
</script>
